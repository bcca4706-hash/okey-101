<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>101 Okey Online</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
:root{--bg:#0a1612;--felt:#0f3d2e;--gold:#d4a843;--tile:#f4ede0;--txt:#e8e2d2;--panel:#13251d;--ok:#27ae60;--danger:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Trebuchet MS',sans-serif;background:radial-gradient(ellipse at 50% 30%,var(--felt),var(--bg));color:var(--txt);display:flex;flex-direction:column;user-select:none;}
.screen{display:none;flex-direction:column;height:100%;width:100%;}
.screen.active{display:flex;}
#lobby{justify-content:center;align-items:center;padding:24px;gap:18px;text-align:center;}
.logo{font-size:48px;font-weight:900;color:var(--gold);text-shadow:0 3px 0 #5c4519;}
.card{background:var(--panel);border:1px solid rgba(212,168,67,.25);border-radius:18px;padding:22px;width:100%;max-width:380px;}
.field{margin-bottom:14px;text-align:left;}
.field label{display:block;font-size:12px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
input{width:100%;padding:13px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:#0a1a14;color:var(--txt);font-size:16px;}
.btn{width:100%;padding:14px;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;color:#10211a;margin-top:8px;}
.btn-gold{background:linear-gradient(180deg,#e6c25c,#c79a2e);}
.btn-green{background:linear-gradient(180deg,#3ddc84,#27ae60);}
.btn-ghost{background:transparent;border:1px solid rgba(212,168,67,.4);color:var(--gold);}
.btn-row{display:flex;gap:10px;}
.stat{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px dashed rgba(255,255,255,.08);}
.stat b{color:var(--gold);}
.hidden{display:none!important;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(0,0,0,.25);}
.topbar .chips{color:var(--gold);font-weight:700;}
.leave{background:none;border:1px solid rgba(255,80,80,.4);color:#ff8a8a;border-radius:8px;padding:6px 10px;font-size:12px;}
.table{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:8px;}
.opponents{display:flex;justify-content:space-around;padding:6px 0;}
.opp{display:flex;flex-direction:column;align-items:center;gap:3px;opacity:.85;}
.opp.turn{transform:scale(1.12);}
.opp .ava{width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#26543f,#0e2a20);border:2px solid rgba(212,168,67,.35);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--gold);}
.opp.turn .ava{border-color:var(--gold);box-shadow:0 0 14px var(--gold);}
.opp .nm{font-size:11px;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.opp .cnt{font-size:10px;background:rgba(0,0,0,.4);padding:2px 7px;border-radius:8px;color:var(--gold);}
.center{display:flex;justify-content:center;align-items:center;gap:18px;padding:8px 0;flex-wrap:wrap;}
.pile{display:flex;flex-direction:column;align-items:center;gap:5px;}
.pile .lbl{font-size:10px;text-transform:uppercase;color:var(--gold);}
.stack{cursor:pointer;}
.deck-back{width:46px;height:64px;border-radius:7px;background:repeating-linear-gradient(45deg,#1d4d3a,#1d4d3a 4px,#163d2e 4px,#163d2e 8px);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);}
</style>
</head>
<body>

<style>
.tile{width:46px;height:64px;border-radius:7px;background:linear-gradient(155deg,#fbf6ea,#e6dcc6);border:1px solid #cdc3ad;box-shadow:inset 0 1px 0 #fff,0 3px 5px rgba(0,0,0,.35);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;cursor:grab;}
.tile .num{font-size:24px;line-height:1;}

.tile.selected{transform:translateY(-12px);box-shadow:0 0 0 2px var(--gold);}

.rack-info .okey-show{display:flex;align-items:center;gap:6px;color:var(--gold);}
.rack{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;background:rgba(0,0,0,.18);border-radius:10px;padding:8px;min-height:148px;align-content:flex-start;}

.actions{display:flex;gap:8px;padding:10px 8px 0;}
.actions .btn{flex:1;font-size:14px;padding:12px;margin-top:0;color:#fff;}
.actions .btn:disabled{opacity:.35;}
.act-draw{background:linear-gradient(180deg,#5a86c4,#3a6aa8);}
.act-discard{background:linear-gradient(180deg,#e08a3c,#c46a1e);}
.act-finish{background:linear-gradient(180deg,#3ddc84,#27ae60);color:#06180e;}
.turn-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);color:var(--gold);padding:14px 28px;border-radius:14px;font-size:18px;font-weight:800;pointer-events:none;opacity:0;transition:opacity .3s;z-index:30;}
.turn-banner.show{opacity:1;}
#toast{position:absolute;top:64px;left:50%;transform:translateX(-50%);background:rgba(192,57,43,.95);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .25s;z-index:40;max-width:90%;text-align:center;}
#toast.show{opacity:1;}
#over{position:absolute;inset:0;background:rgba(5,12,9,.92);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;}
#over.show{display:flex;}
#over h2{color:var(--gold);font-size:34px;}
.score-list{width:100%;max-width:340px;}
.score-row{display:flex;justify-content:space-between;padding:11px 14px;background:var(--panel);border-radius:9px;margin-bottom:7px;font-size:15px;}
.score-row.win{border:1px solid var(--gold);color:var(--gold);}
.pts.neg{color:var(--ok);}.pts.pos{color:#ff8a8a;}
#waiting{position:absolute;inset:0;background:rgba(5,12,9,.85);z-index:45;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
#waiting.show{display:flex;}
.spinner{width:54px;height:54px;border:5px solid rgba(212,168,67,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#game{position:relative;}
</style>

<script>
const $=id=>document.getElementById(id);
let socket=null,me=null,state=null,roomId=null,selectedTileId=null,server='',savedId=null;
$('loginBtn').onclick=async()=>{
  const name=$('nameInput').value.trim()||'Oyuncu';
  server=$('serverInput').value.trim().replace(/\/$/,'');
  if(!server){toast('Sunucu adresi gir');return;}
  try{
    const r=await fetch(server+'/auth/guest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,id:savedId})});
    if(!r.ok)throw new Error('Giris basarisiz');
    const data=await r.json(); me=data.player; savedId=me.id;
    showMenu(); connectSocket(data.token);
  }catch(e){toast('Baglanamadi: '+e.message);}
};
function showMenu(){
  $('loginCard').classList.add('hidden'); $('menuCard').classList.remove('hidden');
  $('meName').textContent=me.name; $('meChips').textContent=me.chips; $('meWins').textContent=me.games_won??0;
}
function connectSocket(token){
  socket=io(server,{auth:{token}});
  socket.on('connect_error',e=>toast('Baglanti hatasi: '+e.message));
  socket.on('error:msg',m=>toast(m));
  socket.on('matchmaking:waiting',({queueSize})=>{gotoGame();$('waiting').classList.add('show');$('waiting').querySelector('div:last-child').textContent='Rakip bekleniyor... ('+queueSize+'/4)';});
  socket.on('room:created',({roomId:rid})=>{roomId=rid;gotoGame();$('waiting').classList.add('show');$('waiting').querySelector('div:last-child').textContent='Oda kodu: '+rid;});
  socket.on('room:update',({players})=>{$('waiting').querySelector('div:last-child').textContent='Oyuncular: '+players.length+'/4';});
  socket.on('game:state',s=>{state=s;roomId=s.roomId;$('waiting').classList.remove('show');render();});
  socket.on('game:over',d=>showOver(d.winner,d.pot,d.scores,d.finishedByOkey,d.finishedFromHand));
}
$('quickBtn').onclick=()=>socket.emit('matchmaking:join',{bet:+$('betInput').value||100});
$('createBtn').onclick=()=>socket.emit('room:create',{bet:+$('betInput').value||100});
$('joinBtn').onclick=()=>{const rid=prompt('Oda kodu:');if(rid){roomId=rid;socket.emit('room:join',{roomId:rid});gotoGame();$('waiting').classList.add('show');}};
$('boardBtn').onclick=async()=>{try{const r=await fetch(server+'/leaderboard');const list=await r.json();alert('LIDERLIK\n\n'+list.map((p,i)=>(i+1)+'. '+p.name+' - '+p.chips).join('\n'));}catch{toast('Tablo alinamadi');}};
function gotoGame(){$('lobby').classList.remove('active');$('game').classList.add('active');}
$('leaveBtn').onclick=$('backLobby').onclick=()=>{$('over').classList.remove('show');$('game').classList.remove('active');$('lobby').classList.add('active');$('loginCard').classList.add('hidden');$('menuCard').classList.remove('hidden');state=null;roomId=null;selectedTileId=null;};
function myTurn(){return state&&state.turn===me.id;}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}
function banner(txt){const b=$('turnBanner');b.textContent=txt;b.classList.add('show');clearTimeout(b._t);b._t=setTimeout(()=>b.classList.remove('show'),1400);}
</script>

<script>
$('drawBtn').onclick=()=>{if(!myTurn()||state.phase!=='draw'){toast('Sira sende degil');return;}socket.emit('game:draw',{roomId,from:'pile'});};
$('drawPile').onclick=()=>{if(myTurn()&&state.phase==='draw')socket.emit('game:draw',{roomId,from:'pile'});};
$('discardPile').onclick=()=>{if(myTurn()&&state.phase==='draw')socket.emit('game:draw',{roomId,from:'discard'});};
$('discardBtn').onclick=()=>{if(!selectedTileId){toast('Atilacak tasi sec');return;}if(!myTurn()||state.phase!=='discard'){toast('Once tas cek');return;}socket.emit('game:discard',{roomId,tileId:selectedTileId});selectedTileId=null;};
$('finishBtn').onclick=()=>openFinish();
function tileEl(t,small,selectable){
  const d=document.createElement('div'); d.className='tile'+(small?' small':'');
  if(t.fake){d.classList.add('fake');}
  else{d.classList.add(t.color);const ok=state&&state.okey&&t.color===state.okey.color&&t.num===state.okey.num;if(ok)d.classList.add('okeytile');d.innerHTML='<span class="num">'+t.num+'</span><span class="dot"></span>';}
  d.dataset.id=t.id;
  if(selectable){
    d.onclick=()=>{if(!myTurn()){toast('Sira sende degil');return;}document.querySelectorAll('.rack .tile.selected').forEach(x=>x.classList.remove('selected'));if(selectedTileId===t.id){selectedTileId=null;}else{selectedTileId=t.id;d.classList.add('selected');}};
    enableDrag(d,t);
  }
  return d;
}
function render(){
  if(!state)return;
  $('gChips').textContent=me.chips??0; $('gRoom').textContent='Oda '+(state.roomId||'').slice(0,6);
  $('indicator').innerHTML=''; if(state.indicator)$('indicator').appendChild(tileEl(state.indicator,true,false));
  $('okeyShow').innerHTML=''; if(state.okey)$('okeyShow').appendChild(tileEl({...state.okey,id:'ok'},true,false));
  $('deckCount').textContent=state.drawPileCount;
  const mi=state.players.findIndex(p=>p.playerId===me.id);
  const li=(mi-1+state.players.length)%state.players.length;
  const leftId=state.players[li]?.playerId;
  const ld=(state.discardPiles[leftId]||[]).slice(-1)[0];
  $('discardPile').innerHTML=''; if(ld)$('discardPile').appendChild(tileEl(ld,true,false));else $('discardPile').innerHTML='<div class="deck-back" style="opacity:.3">-</div>';
  const opp=$('opponents'); opp.innerHTML='';
  state.players.forEach(p=>{if(p.playerId===me.id)return;const d=document.createElement('div');d.className='opp'+(state.turn===p.playerId?' turn':'');d.innerHTML='<div class="ava">'+(p.name||'?')[0].toUpperCase()+'</div><div class="nm">'+p.name+'</div><div class="cnt">'+p.tileCount+'</div>';opp.appendChild(d);});
  const rack=$('rack'); rack.innerHTML='';
  (state.myHand||[]).forEach(t=>rack.appendChild(tileEl(t,false,true)));
  $('handCount').textContent=(state.myHand||[]).length;
  const turn=myTurn();
  $('drawBtn').disabled=!(turn&&state.phase==='draw');
  $('discardBtn').disabled=!(turn&&state.phase==='discard');
  $('finishBtn').disabled=!(turn&&state.phase==='discard');
  if(turn)banner(state.phase==='draw'?'Sira sende - tas cek':'Tas at veya bitir');
}
function openFinish(){
  if(!myTurn()||state.phase!=='discard'){toast('Once tas cek');return;}
  const hand=state.myHand;
  const guide=hand.map((t,i)=>i+':'+(t.fake?'*':t.num+t.color[0])).join(' ');
  const inp=prompt('Perleri grupla. Per icindeki tas sira numaralarini virgulle, perler arasi | ile ayir.\nOrnek: 0,1,2 | 5,6,7\n\nElin:\n'+guide);
  if(!inp)return;
  const sets=inp.split('|').map(g=>g.trim().split(',').map(i=>hand[+i.trim()]).filter(Boolean)).filter(g=>g.length);
  const used=new Set(sets.flat().map(t=>t.id));
  const discard=hand.find(t=>!used.has(t.id));
  socket.emit('game:finish',{roomId,sets,discardTileId:discard?.id});
}
let dragId=null;
function enableDrag(el,t){
  el.draggable=true;
  el.addEventListener('dragstart',()=>{dragId=t.id;});
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('dragover');});
  el.addEventListener('dragleave',()=>el.classList.remove('dragover'));
  el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('dragover');reorder(dragId,t.id);});
  el.addEventListener('touchstart',()=>{dragId=t.id;},{passive:true});
  el.addEventListener('touchend',e=>{const tg=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);const tt=tg&&tg.closest('.tile');if(tt&&tt.dataset.id!=dragId)reorder(dragId,+tt.dataset.id);});
}
function reorder(fromId,toId){
  const h=state.myHand;const fi=h.findIndex(t=>t.id==fromId),ti=h.findIndex(t=>t.id==toId);
  if(fi<0||ti<0)return;const[m]=h.splice(fi,1);h.splice(ti,0,m);render();
}
function showOver(winner,pot,scores,byOkey,fromHand){
  $('over').classList.add('show');
  $('overTitle').textContent=winner===me.id?'Kazandin!':'El Bitti';
  const list=$('scoreList');list.innerHTML='';
  state.players.forEach(p=>{const sc=scores[p.playerId];const row=document.createElement('div');row.className='score-row'+(p.playerId===winner?' win':'');const cls=sc<0?'neg':'pos';row.innerHTML='<span>'+p.name+(p.playerId===winner?' (1)':'')+'</span><span class="pts '+cls+'">'+(sc>0?'+':'')+sc+'</span>';list.appendChild(row);});
  let sub=byOkey?'(Okeyle bitis)':fromHand?'(Elden bitis)':'';
  if(sub){const s=document.createElement('div');s.style.cssText='color:var(--gold);font-size:13px';s.textContent=sub;list.appendChild(s);}
}
</script>
</body>
